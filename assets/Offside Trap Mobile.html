document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

oke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><line x1=\"8\" y1=\"11\" x2=\"14\" y2=\"11\"><\u002Fline><\u002Fsvg>\n                <\u002Fspan>\n              <\u002Fdiv>\n              <!-- 2D / 3D tilt toggle -->\n              <div style=\"display:flex;background:#15140f;border-radius:13px;padding:4px;flex-shrink:0;\">\n                <button onclick=\"{{ setFlat }}\" style=\"{{ flatBtnStyle }}\">2D<\u002Fbutton>\n                <button onclick=\"{{ set3D }}\" style=\"{{ tiltBtnStyle }}\">3D<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- kit / marker design -->\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#9a937f;flex-shrink:0;\">Kit<\u002Fspan>\n              <div style=\"display:flex;gap:7px;flex:1;\">\n                <span style=\"flex:1;height:34px;border-radius:9px;background:#fbf5e9;border:2px solid #15140f;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;\">\n                  <span style=\"position:absolute;inset:0;background:repeating-linear-gradient(90deg,#fbf5e9 0 5px,#c6f24e 5px 10px);\"><\u002Fspan>\n                <\u002Fspan>\n                <span style=\"flex:1;height:34px;border-radius:9px;background:#c6f24e;border:1.5px solid #15140f;\"><\u002Fspan>\n                <span style=\"flex:1;height:34px;border-radius:9px;background:#fbf5e9;border:1.5px solid #15140f;overflow:hidden;position:relative;\">\n                  <span style=\"position:absolute;inset:0;background:linear-gradient(135deg,#ff6fae 0 50%,#fbf5e9 50% 100%);\"><\u002Fspan>\n                <\u002Fspan>\n                <span style=\"flex:1;height:34px;border-radius:9px;background:#fbf5e9;border:1.5px solid #15140f;overflow:hidden;position:relative;\">\n                  <span style=\"position:absolute;left:0;right:0;top:0;height:50%;background:#4d7cff;\"><\u002Fspan>\n                <\u002Fspan>\n                <span style=\"width:34px;height:34px;border-radius:9px;background:#15140f;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c6f24e\" stroke-width=\"2.4\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 3v3M12 18v3M3 12h3M18 12h3\"><\u002Fpath><\u002Fsvg>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fx-import>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1800,&quot;height&quot;:1000},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#fe6c0a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#c6f24e&quot;,&quot;#ff6fae&quot;,&quot;#4d7cff&quot;,&quot;#ffc83d&quot;]}}\">\nclass Component extends DCLogic {\n  state = { tool: \"pass\", tilt3D: false };\n\n  renderVals() {\n    const accent = this.props.accent ?? \"#c6f24e\";\n\n    // ── shared 4-3-3 positions on a portrait pitch (top% from bottom-up, left%) ──\n    const ROSTER = [\n      { n: \"1\",  role: \"GK\", t: 90.5, l: 50 },\n      { n: \"2\",  role: \"RB\", t: 76,   l: 79.4 },\n      { n: \"5\",  role: \"CB\", t: 76,   l: 62.6 },\n      { n: \"6\",  role: \"CB\", t: 76,   l: 37.4 },\n      { n: \"3\",  role: \"LB\", t: 76,   l: 20.6 },\n      { n: \"4\",  role: \"DM\", t: 52.5, l: 62.6 },\n      { n: \"8\",  role: \"CM\", t: 52.5, l: 37.4 },\n      { n: \"7\",  role: \"RW\", t: 33.5, l: 75.2 },\n      { n: \"10\", role: \"AM\", t: 33.5, l: 50 },\n      { n: \"11\", role: \"LW\", t: 33.5, l: 24.8 },\n      { n: \"9\",  role: \"ST\", t: 18,   l: 50 },\n    ];\n    const mkPlayers = () => ROSTER.map(p => ({\n      n: p.n, role: p.role,\n      posStyle: {\n        position: \"absolute\", top: p.t + \"%\", left: p.l + \"%\",\n        transform: \"translate(-50%,-50%)\", zIndex: 6,\n        display: \"flex\", flexDirection: \"column\", alignItems: \"center\",\n      },\n    }));\n    // Option B pitch uses a different inset (74→504 of 560), remap vertically\n    const mkPlayersB = () => ROSTER.map(p => {\n      const ty = 13 + (p.t / 100) * 77; // map onto B pitch playing band (13%..90%)\n      return {\n        n: p.n,\n        posStyle: {\n          position: \"absolute\", top: ty + \"%\", left: p.l + \"%\",\n          transform: \"translate(-50%,-50%)\", zIndex: 6,\n          display: \"flex\", flexDirection: \"column\", alignItems: \"center\",\n        },\n      };\n    });\n\n    // ── arrow tool chips ──\n    const chip = (active, dot) => ({\n      display: \"flex\", flexDirection: \"column\", alignItems: \"center\", gap: 3,\n      flex: 1, padding: \"8px 0 6px\", borderRadius: 10, cursor: \"pointer\",\n      fontFamily: \"'Hanken Grotesk',sans-serif\", fontWeight: 700, fontSize: 9.5,\n      letterSpacing: \"0.02em\", color: active ? \"#15140f\" : \"#7a735f\",\n      background: active ? \"#fff\" : \"#f4eedd\",\n      border: active ? (\"1.5px solid \" + dot) : \"1.5px solid #e2d9c4\",\n      boxShadow: active ? (\"0 2px 0 \" + dot) : \"none\",\n    });\n    const glyph = (active, dot, dashed) => ({\n      width: 18, height: 0, marginBottom: 2,\n      borderTop: (dashed ? \"2.5px dashed \" : \"2.5px solid \") + (active ? dot : \"#bdb49d\"),\n      borderRadius: 2,\n    });\n    const ballDefs = [\n      { key: \"pass\", label: \"Pass\", dash: true },\n      { key: \"dribble\", label: \"Carry\", dash: false },\n      { key: \"long\", label: \"Long\", dash: true },\n      { key: \"target\", label: \"Target\", dash: false },\n    ];\n    const runDefs = [\n      { key: \"direct\", label: \"Direct\", dash: false },\n      { key: \"secondary\", label: \"2nd\", dash: true },\n      { key: \"curved\", label: \"Curved\", dash: false },\n      { key: \"press\", label: \"Press\", dash: true },\n    ];\n    const buildTools = (defs, dot) => defs.map(d => {\n      const active = this.state.tool === d.key;\n      return {\n        label: d.label,\n        style: chip(active, dot),\n        glyph: glyph(active, dot, d.dash),\n        onClick: () => this.setState({ tool: d.key }),\n      };\n    });\n\n    // ── 3D tilt toggle ──\n    const tilt = this.state.tilt3D;\n    const lineupBoardStyle = {\n      position: \"relative\", width: \"100%\", height: \"100%\",\n      border: \"1.5px solid #15140f\", borderRadius: 20, overflow: \"hidden\",\n      background: \"radial-gradient(130% 80% at 50% 0%, #2a7350, #123a28)\",\n      boxShadow: \"6px 10px 24px rgba(0,0,0,0.3)\",\n      transition: \"transform 0.45s cubic-bezier(.4,0,.2,1)\",\n      transform: tilt\n        ? \"rotateX(46deg) scale(0.92) translateY(-22px)\"\n        : \"rotateX(0deg) scale(1)\",\n      transformOrigin: \"center 58%\",\n    };\n    const segBtn = (active) => ({\n      border: \"none\", cursor: \"pointer\", borderRadius: 9, padding: \"8px 13px\",\n      fontFamily: \"'Archivo',sans-serif\", fontWeight: 800, fontSize: 13,\n      background: active ? accent : \"transparent\",\n      color: active ? \"#15140f\" : \"rgba(255,255,255,0.62)\",\n    });\n\n    return {\n      deviceW: 402, deviceH: 874, accent,\n      kickerDotStyle: { width: 9, height: 9, borderRadius: 3, background: accent, flexShrink: 0 },\n      arrowBtnStyle: { width: 50, height: 50, borderRadius: 13, background: accent, border: \"1.5px solid #15140f\", display: \"flex\", alignItems: \"center\", justifyContent: \"center\", flexShrink: 0 },\n      players: mkPlayers(),\n      playersB: mkPlayersB(),\n      ballTools: buildTools(ballDefs, \"#fbbf24\"),\n      runTools: buildTools(runDefs, \"#60a5fa\"),\n      lineupBoardStyle,\n      flatBtnStyle: segBtn(!tilt),\n      tiltBtnStyle: segBtn(tilt),\n      setFlat: () => this.setState({ tilt3D: false }),\n      set3D: () => this.setState({ tilt3D: true }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
